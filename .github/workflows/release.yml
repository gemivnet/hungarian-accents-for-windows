name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Inject version into source
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $file = "src\lib\version.ahk"
          (Get-Content $file -Raw) -replace '0\.0\.0-dev', $v | Set-Content $file -NoNewline

      - name: Download AutoHotkey v2 runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ahkVersion = "2.0.18"
          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$ahkVersion/AutoHotkey_$ahkVersion.zip" -OutFile ahk.zip
          Expand-Archive -Path ahk.zip -DestinationPath ahk -Force

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          & $iscc /DAppVersion=${{ steps.ver.outputs.version }} /Odist installer\HungarianAccents.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HungarianAccentsSetup.exe
          generate_release_notes: true
          make_latest: 'true'
