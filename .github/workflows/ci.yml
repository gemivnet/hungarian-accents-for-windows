name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2 via official installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://www.autohotkey.com/download/ahk-v2.exe" -OutFile ahk-v2-installer.exe
          # /S = silent install (NSIS convention used by AHK installer)
          $proc = Start-Process -FilePath ".\ahk-v2-installer.exe" -ArgumentList "/S" -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"
          Write-Host "Contents of C:\Program Files\AutoHotkey :"
          Get-ChildItem "C:\Program Files\AutoHotkey" -ErrorAction SilentlyContinue | Format-Table Name
          Write-Host "Contents of Compiler subfolder:"
          Get-ChildItem "C:\Program Files\AutoHotkey\Compiler" -ErrorAction SilentlyContinue | Format-Table Name

      - name: Compile
        shell: cmd
        timeout-minutes: 5
        run: |
          mkdir dist 2>nul
          set "AHKDIR=C:\Program Files\AutoHotkey"
          set "COMPILER=%AHKDIR%\Compiler\Ahk2Exe.exe"
          set "BASE=%AHKDIR%\v2\AutoHotkey64.exe"
          if not exist "%BASE%" set "BASE=%AHKDIR%\AutoHotkey64.exe"
          echo Compiler: %COMPILER%
          echo Base:     %BASE%
          start /wait /min "" "%COMPILER%" /in src\main.ahk /out dist\HungarianAccents.exe /base "%BASE%"
          echo Ahk2Exe exit code: %ERRORLEVEL%
          dir dist
          if not exist "dist\HungarianAccents.exe" exit /b 1

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not preinstalled, fetching..."
            choco install innosetup -y --no-progress
          }
          $version = (Get-Content VERSION -Raw).Trim()
          & $iscc /DAppVersion=$version /Odist installer\HungarianAccents.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "dist\HungarianAccentsSetup.exe")) { Write-Error "Installer not produced"; exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: HungarianAccents-preview
          path: |
            dist\HungarianAccents.exe
            dist\HungarianAccentsSetup.exe
