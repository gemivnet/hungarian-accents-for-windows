name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download AutoHotkey v2 + Ahk2Exe
        shell: pwsh
        run: |
          $ahkVersion = "2.0.18"
          $url = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$ahkVersion/AutoHotkey_$ahkVersion.zip"
          Invoke-WebRequest -Uri $url -OutFile ahk.zip
          Expand-Archive -Path ahk.zip -DestinationPath ahk -Force
          if (-not (Test-Path "ahk\Compiler\Ahk2Exe.exe")) {
            Write-Error "Ahk2Exe.exe not found in AutoHotkey zip"
            exit 1
          }

      - name: Compile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $base = "$PWD\ahk\AutoHotkey64.exe"
          $compiler = "$PWD\ahk\Compiler\Ahk2Exe.exe"
          $iconArg = @()
          if (Test-Path "assets\icon.ico") { $iconArg = @("/icon", "assets\icon.ico") }
          & $compiler /in src\main.ahk /out dist\HungarianAccents.exe /base $base @iconArg
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "dist\HungarianAccents.exe")) { Write-Error "Build did not produce .exe"; exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: HungarianAccents-preview
          path: dist\HungarianAccents.exe
