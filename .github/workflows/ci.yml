name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2 via Chocolatey
        shell: pwsh
        run: |
          choco install autohotkey -y --no-progress
          $ahkDir = "C:\Program Files\AutoHotkey"
          Write-Host "AHK dir contents:"
          Get-ChildItem $ahkDir | Format-Table Name,Length
          Get-ChildItem "$ahkDir\v2" -ErrorAction SilentlyContinue | Format-Table Name,Length

      - name: Download Ahk2Exe and install into AHK Compiler dir
        shell: pwsh
        run: |
          $url = (Invoke-RestMethod "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest").assets[0].browser_download_url
          Invoke-WebRequest -Uri $url -OutFile ahk2exe.zip
          $compilerDir = "C:\Program Files\AutoHotkey\Compiler"
          New-Item -ItemType Directory -Force -Path $compilerDir | Out-Null
          Expand-Archive -Path ahk2exe.zip -DestinationPath $compilerDir -Force
          Get-ChildItem $compilerDir | Format-Table Name,Length

      - name: Compile
        shell: cmd
        timeout-minutes: 5
        run: |
          mkdir dist 2>nul
          set "AHKDIR=C:\Program Files\AutoHotkey"
          set "COMPILER=%AHKDIR%\Compiler\Ahk2Exe.exe"
          set "BASE=%AHKDIR%\v2\AutoHotkey64.exe"
          if not exist "%BASE%" set "BASE=%AHKDIR%\AutoHotkey64.exe"
          echo Compiler: %COMPILER%
          echo Base:     %BASE%
          start /wait /min "" "%COMPILER%" /in src\main.ahk /out dist\HungarianAccents.exe /base "%BASE%"
          echo Ahk2Exe exit code: %ERRORLEVEL%
          dir dist
          if not exist "dist\HungarianAccents.exe" exit /b 1

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not preinstalled, fetching..."
            choco install innosetup -y --no-progress
          }
          $version = (Get-Content VERSION -Raw).Trim()
          & $iscc /DAppVersion=$version /Odist installer\HungarianAccents.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "dist\HungarianAccentsSetup.exe")) { Write-Error "Installer not produced"; exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: HungarianAccents-preview
          path: |
            dist\HungarianAccents.exe
            dist\HungarianAccentsSetup.exe
