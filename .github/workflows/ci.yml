name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download AutoHotkey v2 + Ahk2Exe
        shell: pwsh
        run: |
          $ahkVersion = "2.0.18"
          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$ahkVersion/AutoHotkey_$ahkVersion.zip" -OutFile ahk.zip
          Expand-Archive -Path ahk.zip -DestinationPath ahk -Force
          $ahk2exeAsset = (Invoke-RestMethod "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest").assets[0].browser_download_url
          Invoke-WebRequest -Uri $ahk2exeAsset -OutFile ahk2exe.zip
          Expand-Archive -Path ahk2exe.zip -DestinationPath ahk\Compiler -Force
          if (-not (Test-Path "ahk\Compiler\Ahk2Exe.exe")) {
            Write-Error "Ahk2Exe.exe not found after extracting Ahk2Exe zip"
            Get-ChildItem ahk\Compiler -Recurse | Select-Object -First 30 FullName
            exit 1
          }

      - name: Compile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $base = "$PWD\ahk\AutoHotkey64.exe"
          $compiler = "$PWD\ahk\Compiler\Ahk2Exe.exe"
          $iconArg = @()
          if (Test-Path "assets\icon.ico") { $iconArg = @("/icon", "assets\icon.ico") }
          & $compiler /in src\main.ahk /out dist\HungarianAccents.exe /base $base @iconArg
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "dist\HungarianAccents.exe")) { Write-Error "Build did not produce .exe"; exit 1 }

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not preinstalled, fetching..."
            choco install innosetup -y --no-progress
          }
          $version = (Get-Content VERSION -Raw).Trim()
          & $iscc /DAppVersion=$version /Odist installer\HungarianAccents.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "dist\HungarianAccentsSetup.exe")) { Write-Error "Installer not produced"; exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: HungarianAccents-preview
          path: |
            dist\HungarianAccents.exe
            dist\HungarianAccentsSetup.exe
