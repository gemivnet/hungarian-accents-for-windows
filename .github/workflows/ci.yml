name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download AutoHotkey v2 + Ahk2Exe
        shell: pwsh
        run: |
          $ahkVersion = "2.0.18"
          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$ahkVersion/AutoHotkey_$ahkVersion.zip" -OutFile ahk.zip
          Expand-Archive -Path ahk.zip -DestinationPath ahk -Force
          $ahk2exeAsset = (Invoke-RestMethod "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest").assets[0].browser_download_url
          Invoke-WebRequest -Uri $ahk2exeAsset -OutFile ahk2exe.zip
          Expand-Archive -Path ahk2exe.zip -DestinationPath ahk\Compiler -Force
          if (-not (Test-Path "ahk\Compiler\Ahk2Exe.exe")) {
            Write-Error "Ahk2Exe.exe not found after extracting Ahk2Exe zip"
            Get-ChildItem ahk\Compiler -Recurse | Select-Object -First 30 FullName
            exit 1
          }

      - name: Compile
        shell: pwsh
        timeout-minutes: 5
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $base = "$PWD\ahk\AutoHotkey64.exe"
          $compiler = "$PWD\ahk\Compiler\Ahk2Exe.exe"
          Write-Host "Compiler: $compiler"
          Write-Host "Base:     $base"
          $iconArg = @()
          if (Test-Path "assets\icon.ico") { $iconArg = @("/icon", "assets\icon.ico") }
          # Ahk2Exe is a GUI app — give it a real (hidden) window so Windows
          # pumps messages, otherwise it blocks forever waiting for the
          # UI thread to settle. Also redirect stdin from NUL.
          $argList = @("/in","src\main.ahk","/out","dist\HungarianAccents.exe","/base",$base) + $iconArg
          Write-Host "Args: $($argList -join ' ')"
          $proc = Start-Process -FilePath $compiler -ArgumentList $argList -Wait -PassThru -WindowStyle Hidden -RedirectStandardOutput "ahk2exe.stdout.log" -RedirectStandardError "ahk2exe.stderr.log"
          Write-Host "Ahk2Exe exit code: $($proc.ExitCode)"
          if (Test-Path "ahk2exe.stdout.log") { Write-Host "--- stdout ---"; Get-Content "ahk2exe.stdout.log" }
          if (Test-Path "ahk2exe.stderr.log") { Write-Host "--- stderr ---"; Get-Content "ahk2exe.stderr.log" }
          if ($proc.ExitCode -ne 0) { throw "Ahk2Exe exited with code $($proc.ExitCode)" }
          Write-Host "--- dist contents ---"
          Get-ChildItem dist | Format-Table Name,Length
          if (-not (Test-Path "dist\HungarianAccents.exe")) { throw "Build did not produce dist\HungarianAccents.exe" }

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not preinstalled, fetching..."
            choco install innosetup -y --no-progress
          }
          $version = (Get-Content VERSION -Raw).Trim()
          & $iscc /DAppVersion=$version /Odist installer\HungarianAccents.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "dist\HungarianAccentsSetup.exe")) { Write-Error "Installer not produced"; exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: HungarianAccents-preview
          path: |
            dist\HungarianAccents.exe
            dist\HungarianAccentsSetup.exe
